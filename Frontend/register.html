<!DOCTYPE html>
<html>
    <head>
        <br><br><title>
        User registration
    </title>                                                                                                        
    <link rel="stylesheet" href="style.css"/>
</head>
    <body><center>
        <h2>
            Create Your Account
        </h2>
        <form  id="registerUser" action="#" mathod="POST">
            <label>Full name:</label><br>
            <input type="text" id="name" name="name" placeholder="Enter your name"><br><br>
            <label>Email:</label><br>
            <input type="email" id="email" name="email" placeholder="Enter your mail"><br><br>
            <label>Mobile number:</label><br>
            <input type="tel"  id="mobile" name="number" placeholder="Enter your number"><br><br>
            <label>Password:</label><br>
            <input type="password" id="password" name="password" placeholder=" Create password"><br><br>
            <button type="submit">Register</button>
        </form>
        <br>
        <a href="user-login.html">Already have an account?  Login</a>
        <script src="script.js"></script>
    </center></body>
</html>
